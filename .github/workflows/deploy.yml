name: Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Nuxt
        env:
          NODE_ENV: production
          NUXT_API_BASE: ${{ secrets.NUXT_API_BASE }}
        run: pnpm run build

      - name: Pack build artifact
        run: tar -czf nuxt-output.tar.gz .output

      - name: Copy artifact to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          source: nuxt-output.tar.gz
          target: /tmp

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e
            APP_DIR="/var/www/salonspa_app_v2"
            PM2_NAME="salonspa_app"
            PORT="${{ secrets.APP_PORT }}"
            PORT="${PORT:-3002}"

            mkdir -p "$APP_DIR"
            cd "$APP_DIR"
            tar -xzf /tmp/nuxt-output.tar.gz
            rm -f /tmp/nuxt-output.tar.gz

            printf '%s\n' \
              "NODE_ENV=production" \
              "NUXT_API_BASE=${{ secrets.NUXT_API_BASE }}" \
              "HOST=0.0.0.0" \
              "PORT=${PORT}" \
              "NITRO_PORT=${PORT}" \
              "NITRO_HOST=0.0.0.0" \
              > "$APP_DIR/.env"

            pm2 delete salonspa 2>/dev/null || true

            if pm2 describe "$PM2_NAME" >/dev/null 2>&1; then
              pm2 restart "$PM2_NAME" --update-env
            else
              pm2 start .output/server/index.mjs \
                --name "$PM2_NAME" \
                --cwd "$APP_DIR" \
                --update-env
            fi

            pm2 save

            sleep 3
            if ! curl -fsS "http://127.0.0.1:${PORT}/" >/dev/null; then
              echo "App did not respond on port ${PORT}"
              pm2 status
              pm2 logs "$PM2_NAME" --lines 50 --nostream
              exit 1
            fi
